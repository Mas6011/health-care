<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student - SMK CERIA HEALTH CARE</title>
    <style>
        /* --- General Page Layout --- */
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
            padding: 20px 0; 
        }

        /* --- UI Adjusting Section (Responsive Centering) --- */
        .edit-container { 
            background-color: white; 
            padding: 40px; 
            width: 90%;            /* Responsive: Takes 90% of screen on mobile */
            max-width: 450px;      /* Desktop/Tablet: Locks at 450px */
            box-sizing: border-box; 
            margin: 20px auto; 
            border-radius: 20px; 
            border: 2px solid #cbd5e1; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); 
        }

        /* --- Typography & Headers --- */
        .header-title { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
        h2 { margin: 0 0 25px 0; font-size: 20px; color: #10b981; border-bottom: 2px solid #10b981; padding-bottom: 10px; }
        h3 { font-size: 16px; color: #475569; margin-top: 20px; border-left: 4px solid #10b981; padding-left: 10px; }
        
        /* --- Forms & Inputs --- */
        .input-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #475569; font-size: 13px; }
        input { width: 100%; box-sizing: border-box; border: 1.5px solid #cbd5e1; border-radius: 10px; padding: 10px; font-size: 14px; outline: none; }
        input:focus { border-color: #10b981; }
        hr { border: 0; border-top: 1.5px solid #e2e8f0; margin: 20px 0; }

        /* --- Buttons --- */
        .button-container { display: flex; gap: 15px; margin-top: 30px; }
        button { flex: 1; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-cancel { background-color: #94a3b8; color: white; }
        .btn-save { background-color: #10b981; color: white; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="edit-container">
        <div class="header-title">SMK CERIA HEALTH CARE</div>
        <h2>Add New Student</h2>
        
        <div class="input-group"><label>Full Name</label><input type="text" id="add-name"></div>
        <div class="input-group"><label>Class</label><input type="text" id="add-class"></div>
        <div class="input-group"><label>IC Number</label><input type="text" id="add-ic"></div>
        <div class="input-group"><label>Student Photo</label><input type="file" id="add-pic-student" accept="image/*"></div>
        <div class="input-group"><label>Medical History</label><input type="text" id="add-history"></div>
        <div class="input-group"><label>Allergy</label><input type="text" id="add-allergy"></div>

        <hr>
        <h3>Parent / Guardian 1</h3>
        <div class="input-group"><label>Name</label><input type="text" id="p1-name"></div>
        <div class="input-group"><label>Phone</label><input type="text" id="p1-phone"></div>
        <div class="input-group"><label>IC Number</label><input type="text" id="p1-ic"></div>
        <div class="input-group"><label>Relationship</label><input type="text" id="p1-rel" placeholder="e.g. Mother"></div>
        <div class="input-group"><label>Photo</label><input type="file" id="p1-pic" accept="image/*"></div>

        <hr>
        <h3>Parent / Guardian 2</h3>
        <div class="input-group"><label>Name</label><input type="text" id="p2-name"></div>
        <div class="input-group"><label>Phone</label><input type="text" id="p2-phone"></div>
        <div class="input-group"><label>IC Number</label><input type="text" id="p2-ic"></div>
        <div class="input-group"><label>Relationship</label><input type="text" id="p2-rel" placeholder="e.g. Father"></div>
        <div class="input-group"><label>Photo</label><input type="file" id="p2-pic" accept="image/*"></div>
        
        <div class="button-container">
            <button class="btn-cancel" onclick="window.location.href='dashboard.html'">Cancel</button>
            <button class="btn-save" id="save-btn" onclick="saveProfile()">Save Student</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

    <script>
        // Security check
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert("Unauthorized Access! Please log in first.");
            window.location.href = 'index.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBRTIjVzxF25XURIqR6kx8TYJXFTXmqeMU",
            authDomain: "health-care-c5fe3.firebaseapp.com",
            projectId: "health-care-c5fe3",
            storageBucket: "health-care-c5fe3.firebasestorage.app",
            messagingSenderId: "104419019360",
            appId: "1:104419019360:web:fbd745b50a3d65d7d65105"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        /* --- Image Compressing Section --- */
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; // Resize to 400px wide
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // Convert to high-efficiency JPEG (Quality: 0.7)
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        async function saveProfile() {
            const name = document.getElementById('add-name').value;
            const className = document.getElementById('add-class').value;
            const saveBtn = document.getElementById('save-btn');
            
            if (!name || !className) {
                alert("Please enter at least the student's name and class.");
                return;
            }

            saveBtn.innerText = "Saving to Cloud...";
            saveBtn.disabled = true;

            try {
                const newStudent = {
                    name: name,
                    class: className,
                    icNumber: document.getElementById('add-ic').value,
                    history: document.getElementById('add-history').value,
                    allergy: document.getElementById('add-allergy').value,
                    studentPic: "",
                    parents: [
                        {
                            name: document.getElementById('p1-name').value,
                            phone: document.getElementById('p1-phone').value,
                            ic: document.getElementById('p1-ic').value,
                            rel: document.getElementById('p1-rel').value,
                            pic: ""
                        },
                        {
                            name: document.getElementById('p2-name').value,
                            phone: document.getElementById('p2-phone').value,
                            ic: document.getElementById('p2-ic').value,
                            rel: document.getElementById('p2-rel').value,
                            pic: ""
                        }
                    ],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                // Apply compression to each photo upload
                const sFile = document.getElementById('add-pic-student').files[0];
                if (sFile) newStudent.studentPic = await compressImage(sFile);
                
                const p1File = document.getElementById('p1-pic').files[0];
                if (p1File) newStudent.parents[0].pic = await compressImage(p1File);

                const p2File = document.getElementById('p2-pic').files[0];
                if (p2File) newStudent.parents[1].pic = await compressImage(p2File);

                await db.collection("students").doc(name).set(newStudent);
                localStorage.setItem('currentStudentName', name);

                alert("Student Profile added successfully!");
                window.location.href = 'student-profile.html';

            } catch (error) {
                console.error("Firebase Error:", error);
                alert("Failed to add profile. Check your connection.");
                saveBtn.innerText = "Save Student";
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
