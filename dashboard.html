<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SMK CERIA HEALTH CARE</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        /* --- UI ADJUSTING SECTION --- */
        .dashboard-container {
            background-color: white;
            padding: 30px;
            
            /* Responsive centering and width */
            width: 90%;            /* Margin for mobile */
            max-width: 550px;      /* Longer for Desktop */
            box-sizing: border-box;
            margin: 20px auto;     /* Prevents shifting */

            border-radius: 20px;
            border: 2px solid #cbd5e1;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .header-title { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }

        h2 {
            margin-top: 0;
            font-size: 20px;
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }

        .search-section { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 8px;
        }

        /* NEW: Merged Search Box Style */
        .search-box {
            display: flex;
            border: 1.5px solid #cbd5e1; /* Single border for both */
            border-radius: 12px;
            overflow: hidden; /* Clips the blue button to the radius */
            background: white;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none; /* Border removed to merge */
            outline: none;
            font-size: 16px;
            min-width: 0; /* Prevents push-out on tiny screens */
        }

        .btn-search {
            padding: 0 20px; /* Centered padding for emoji */
            background-color: #3b82f6;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .results-area { min-height: 80px; margin-bottom: 30px; }

        .result-card {
            padding: 15px;
            border-radius: 15px;
            border: 1.5px solid #cbd5e1;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #1e293b;
            background-color: #f1f5f9;
            margin-bottom: 10px;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }

        .left-group { display: flex; gap: 10px; }

        .icon-btn {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: 1.5px solid #cbd5e1;
            background: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            text-decoration: none;
            position: relative;
        }

        .icon-btn:hover {
            background-color: #f8fafc;
            border-color: #3b82f6;
            transform: translateY(-2px);
        }

        .icon-btn:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 60px;
            background: #1e293b;
            color: white;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

        #logout-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .modal-content {
            background: white; padding: 25px; border-radius: 20px;
            text-align: center; width: 300px;
        }

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .confirm-logout { background: #ef4444; color: white; }
        .cancel-logout { background: #f1f5f9; color: #64748b; }

    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-title">SMK CERIA HEALTH CARE</div>
        <h2>Staff Dashboard</h2>

        <div class="search-section">
            <label>Find Student by Name</label>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Enter student name..." oninput="liveSearch()">
                <button class="btn-search" onclick="showResult()">🔍</button>
            </div>
        </div>

        <div class="results-area" id="results-area"></div>

        <div class="bottom-nav">
            <div class="left-group">
                <a href="add-profile.html" class="icon-btn" data-tooltip="Add New Student">➕</a>
                <a href="camera-test.html" class="icon-btn" data-tooltip="Test Scanner">📷</a>
            </div>
            
            <button class="icon-btn btn-logout" data-tooltip="Log Out" onclick="showLogoutModal()">🚪</button>
        </div>
    </div>

    <div id="logout-modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Log Out?</h3>
            <p style="color:#64748b; font-size:14px">Are you sure you want to end your session?</p>
            <div class="modal-btns">
                <button class="cancel-logout" onclick="closeLogoutModal()">Cancel</button>
                <button class="confirm-logout" onclick="processLogout()">Log Out</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert("Unauthorized Access! Please log in first.");
            window.location.href = 'index.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBRTIjVzxF25XURIqR6kx8TYJXFTXmqeMU",
            authDomain: "health-care-c5fe3.firebaseapp.com",
            projectId: "health-care-c5fe3",
            storageBucket: "health-care-c5fe3.firebasestorage.app",
            messagingSenderId: "104419019360",
            appId: "1:104419019360:web:fbd745b50a3d65d7d65105"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allStudents = [];

        window.onload = async function() {
            await loadAllStudents();
        };

        async function loadAllStudents() {
            try {
                const snapshot = await db.collection("students").get();
                allStudents = [];
                snapshot.forEach(doc => {
                    allStudents.push({ id: doc.id, ...doc.data() });
                });
            } catch (e) {
                console.error("Error loading students:", e);
            }
        }

        async function liveSearch() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const resultsArea = document.getElementById('results-area');
            
            if (!query) {
                resultsArea.innerHTML = "";
                return;
            }

            if (allStudents.length === 0) {
                await loadAllStudents();
            }

            const filtered = allStudents.filter(student => 
                student.name.toLowerCase().startsWith(query)
            );

            if (filtered.length === 0) {
                resultsArea.innerHTML = `<div class="result-card"><span>No students found.</span></div>`;
                return;
            }

            resultsArea.innerHTML = filtered.map(student => `
                <a href="student-profile.html" style="text-decoration: none; display: block;" onclick="localStorage.setItem('currentStudentName', '${student.name}')">
                    <div class="result-card">
                        <span>Name: ${student.name}</span>
                        <span>Class: ${student.class}</span>
                    </div>
                </a>
            `).join('');
        }

        async function showResult() {
            await liveSearch();
        }

        function showLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
        
        function processLogout() {
            firebase.auth().signOut().then(() => {
                localStorage.removeItem('isLoggedIn');
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
