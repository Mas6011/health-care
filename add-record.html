<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Record - SMK CERIA HEALTH CARE</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
        }

        .form-container { 
            background-color: white; 
            padding: 40px; 
            width: 90%;
            max-width: 450px;
            box-sizing: border-box;
            margin: 20px auto;
            border-radius: 20px; 
            border: 2px solid #cbd5e1; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); 
        }

        h2 { 
            margin: 0 0 25px 0; 
            font-size: 20px; 
            color: #3b82f6; 
            border-bottom: 2px solid #3b82f6; 
            padding-bottom: 10px; 
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: bold; color: #64748b; margin-bottom: 8px; }
        
        input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #cbd5e1; 
            box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s;
        }

        input:focus { border-color: #3b82f6; background-color: #f8fafc; }

        .btn-save { 
            width: 100%; padding: 14px; background-color: #3b82f6; color: white; border: none; 
            border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .btn-save:hover { background-color: #2563eb; transform: translateY(-2px); }

        /* FIXED MODAL STYLING */
        #time-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); display: none; justify-content: center;
            align-items: center; z-index: 9999; /* Higher Z-index to be clickable */
        }

        .modal-content {
            background: white; padding: 30px; border-radius: 20px; width: 320px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-btn {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none;
            font-weight: bold; cursor: pointer; font-size: 15px;
        }
        .btn-auto { background: #3b82f6; color: white; }
        .btn-manual { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>

    <div class="form-container">
        <div style="font-size: 14px; color: #64748b; margin-bottom: 5px;">Medicine Log For:</div>
        <h2 id="display-name">Loading...</h2>

        <div class="input-group">
            <label>Date</label>
            <input type="date" id="med-date">
        </div>

        <div class="input-group">
            <label>Time</label>
            <input type="text" id="med-time" placeholder="Tap to select time" readonly onclick="openTimeModal()">
        </div>

        <div class="input-group">
            <label>Medicine Name</label>
            <input type="text" id="med-name" placeholder="e.g. Paracetamol">
        </div>

        <div class="input-group">
            <label>Amount / Dosage</label>
            <input type="text" id="med-amount" placeholder="e.g. 2 Tablets">
        </div>

        <button class="btn-save" onclick="saveRecord()">Save Record</button>
        <button onclick="window.history.back()" style="width:100%; background:none; border:none; color:#64748b; margin-top:15px; cursor:pointer;">Cancel</button>
    </div>

    <div id="time-modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Select Time</h3>
            <button class="modal-btn btn-auto" onclick="setCurrentTime()">Set to Current Time</button>
            <button class="modal-btn btn-manual" onclick="setManualTime()">Type Manually</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#94a3b8; margin-top:10px; cursor:pointer;">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

    <script>
    // The Security Guard
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert("Unauthorized Access! Please log in first.");
            window.location.href = 'index.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBRTIjVzxF25XURIqR6kx8TYJXFTXmqeMU",
            authDomain: "health-care-c5fe3.firebaseapp.com",
            projectId: "health-care-c5fe3",
            storageBucket: "health-care-c5fe3.firebasestorage.app",
            messagingSenderId: "104419019360",
            appId: "1:104419019360:web:fbd745b50a3d65d7d65105",
            measurementId: "G-MBETSFCGR3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        window.onload = function() {
            const targetName = localStorage.getItem('currentStudentName');
            if (targetName) {
                document.getElementById('display-name').innerText = targetName;
            } else {
                window.location.href = 'dashboard.html';
            }

            const today = new Date().toISOString().split('T')[0];
            document.getElementById('med-date').value = today;
        };

        // FIXED MODAL FUNCTIONS
        function openTimeModal() {
            document.getElementById('time-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('time-modal').style.display = 'none';
        }

        function setCurrentTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const timeInput = document.getElementById('med-time');
            timeInput.value = `${h}:${m}`;
            timeInput.readOnly = true; // Lock it back
            closeModal();
        }

        function setManualTime() {
            const timeInput = document.getElementById('med-time');
            timeInput.readOnly = false; // UNLOCK it for typing
            timeInput.value = "";
            timeInput.placeholder = "Example: 14:30";
            closeModal();
            timeInput.focus();
        }

        async function saveRecord() {
            const date = document.getElementById('med-date').value;
            const time = document.getElementById('med-time').value;
            const name = document.getElementById('med-name').value;
            const amount = document.getElementById('med-amount').value;
            const studentName = localStorage.getItem('currentStudentName');

            if(!date || !time || !name || !amount) {
                alert("Please fill in all fields.");
                return;
            }

            const saveBtn = document.querySelector('.btn-save');
            saveBtn.innerText = "Saving...";
            saveBtn.disabled = true;

            try {
                await db.collection("medication_logs").add({
                    studentName: studentName,
                    date: date,
                    time: time,
                    medicineName: name,
                    dosage: amount,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Record saved to Cloud!");
                window.location.href = 'records.html';
            } catch (error) {
                console.error(error);
                alert("Error saving record.");
                saveBtn.innerText = "Save Record";
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
