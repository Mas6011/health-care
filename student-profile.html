<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - SMK CERIA HEALTH CARE</title>
    <style>
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
        }

        /* --- UI ADJUSTING SECTION --- */
        .profile-container { 
            background-color: white; 
            padding: 40px; 
            
            /* Responsive centering and width fix */
            width: 92%;            /* Equal margin on both sides for mobile */
            max-width: 550px;      /* Matches the wide look on desktop */
            box-sizing: border-box; 
            margin: 20px auto;     /* Perfectly centers the card */

            border-radius: 20px; 
            border: 2px solid #cbd5e1; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); 
        }

        /* Adjust padding for small screens to keep content tight */
        @media (max-width: 480px) {
            .profile-container { padding: 25px; }
        }

        .header-title { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
        h2 { margin: 0 0 25px 0; font-size: 22px; color: #3b82f6; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; }
        .info-layout { display: flex; gap: 25px; margin-bottom: 20px; align-items: center; }
        
        .profile-img { 
            width: 120px; 
            height: 120px; 
            background-color: #e2e8f0; 
            border-radius: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 50px; 
            border: 1.5px solid #cbd5e1; 
        }

        .p-box { flex: 1; }
        .p-name { font-size: 20px; font-weight: bold; color: #1e293b; margin-bottom: 5px; }
        .p-class { font-size: 16px; color: #64748b; font-weight: bold; }

        .section-box { 
            background: #f8fafc; 
            padding: 15px; 
            border-radius: 15px; 
            border: 1.5px solid #cbd5e1; 
            margin-bottom: 15px; 
        }

        .section-title { font-size: 14px; font-weight: bold; color: #475569; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .section-data { font-size: 16px; color: #1e293b; font-weight: bold; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        
        .btn { 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.2s; 
            text-align: center;
            text-decoration: none;
        }

        .btn-med { background-color: #3b82f6; color: white; }
        .btn-back { background-color: #f1f5f9; color: #475569; }
        
        .bottom-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-call { flex: 2; background-color: white; border: 1.5px solid #3b82f6; color: #3b82f6; }
        .btn-emer { flex: 1; background-color: #fee2e2; border: 1.5px solid #ef4444; color: #ef4444; font-size: 20px; }

        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); display: none; justify-content: center; 
            align-items: center; z-index: 1000; 
        }
        .modal-box { 
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; 
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
        }
        .modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="header-title">SMK CERIA HEALTH CARE</div>
        <h2>Student Profile</h2>

        <div class="info-layout">
            <div class="profile-img" id="display-emoji">👤</div>
            <div class="p-box">
                <div class="p-name" id="display-name">Loading...</div>
                <div class="p-class" id="display-class">...</div>
            </div>
        </div>

        <div class="section-box">
            <span class="section-title">Medical Conditions</span>
            <div class="section-data" id="display-med">None Reported</div>
        </div>

        <div class="section-box" onclick="toggleParents()" style="cursor: pointer;">
            <span class="section-title">Parent/Guardian Info ▾</span>
            <div id="parents-content" style="display: none; margin-top: 10px; font-size: 14px;">
                <div id="parent-list">Loading parents...</div>
            </div>
        </div>

        <div class="actions">
            <a href="add-record.html" class="btn btn-med">➕ Add Record</a>
            <a href="dashboard.html" class="btn btn-back">⬅ Back</a>
        </div>

        <div class="bottom-actions">
            <button class="btn btn-call" onclick="callParent()">📞 Call Parents</button>
            <button class="btn btn-emer" onclick="triggerEmergency()">🚨</button>
        </div>
    </div>

    <div id="call-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title" style="margin-top:0;">Select Contact</h3>
            <div id="modal-button-container" class="modal-btns"></div>
            <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#64748b; font-weight:bold; cursor:pointer;">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRTIjVzxF25XURIqR6kx8TYJXFTXmqeMU",
            authDomain: "health-care-c5fe3.firebaseapp.com",
            projectId: "health-care-c5fe3",
            storageBucket: "health-care-c5fe3.firebasestorage.app",
            messagingSenderId: "104419019360",
            appId: "1:104419019360:web:fbd745b50a3d65d7d65105"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const currentName = localStorage.getItem('currentStudentName');
        let currentStudentData = null;

        if(!currentName) {
            window.location.href = 'dashboard.html';
        }

        async function fetchProfile() {
            try {
                const doc = await db.collection("students").doc(currentName).get();
                if(doc.exists) {
                    currentStudentData = doc.data();
                    document.getElementById('display-name').innerText = currentStudentData.name;
                    document.getElementById('display-class').innerText = `Class: ${currentStudentData.class}`;
                    document.getElementById('display-med').innerText = currentStudentData.medical || "No known conditions";
                    
                    if(currentStudentData.gender === "Female") {
                        document.getElementById('display-emoji').innerText = "👩‍🎓";
                    } else {
                        document.getElementById('display-emoji').innerText = "👨‍🎓";
                    }

                    renderParentList();
                }
            } catch (e) {
                console.error(e);
            }
        }

        fetchProfile();

        function renderParentList() {
            const list = document.getElementById('parent-list');
            if(currentStudentData.parents && currentStudentData.parents.length > 0) {
                list.innerHTML = currentStudentData.parents.map(p => 
                    `<div style="margin-bottom:8px;"><b>${p.name}</b> (${p.rel})<br>${p.phone}</div>`
                ).join('');
            } else {
                list.innerText = "No parent information found.";
            }
        }

        function openSelectionModal(title, isEmergency) {
            const modal = document.getElementById('call-modal');
            const titleEl = document.getElementById('modal-title');
            const btnContainer = document.getElementById('modal-button-container');
            
            titleEl.innerText = title;
            titleEl.style.color = isEmergency ? "#ef4444" : "#1e293b";
            btnContainer.innerHTML = "";

            if(currentStudentData && currentStudentData.parents) {
                currentStudentData.parents.forEach(parent => {
                    if(parent.name) {
                        const btn = document.createElement('button');
                        const color = isEmergency ? "#ef4444" : "#3b82f6";
                        btn.style.cssText = `padding:12px; border-radius:10px; border:1.5px solid ${color}; background:white; color:${color}; font-weight:bold; cursor:pointer;`;
                        
                        const relation = parent.rel ? ` (${parent.rel})` : "";
                        btn.innerText = `📞 Call ${parent.name}${relation}`;
                        
                        btn.onclick = () => {
                            window.location.href = `tel:${parent.phone}`;
                            closeModal();
                        };
                        btnContainer.appendChild(btn);
                    }
                });
            }
            modal.style.display = 'flex';
        }

        function toggleParents() {
            const content = document.getElementById('parents-content');
            content.style.display = (content.style.display === "block") ? "none" : "block";
        }

        function callParent() { openSelectionModal("Select Parent to Call", false); }
        function triggerEmergency() { openSelectionModal("🚨 EMERGENCY PROTOCOL", true); }
        function closeModal() { document.getElementById('call-modal').style.display = 'none'; }
    </script>
</body>
</html>
