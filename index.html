<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK CERIA - Staff Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .login-container { background: white; padding: 40px; width: 350px; border-radius: 20px; border: 2px solid #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { font-size: 20px; color: #1e293b; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; margin-bottom: 25px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #64748b; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #cbd5e1; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 14px; background: #059669; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>STAFF PORTAL</h2>
        <div class="input-group">
            <label>Staff Email</label>
            <input type="email" id="email">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password">
        </div>
        <button class="btn-login" onclick="handleLogin()">Log In</button>
        <p id="error-msg" style="color:red; font-size:12px; margin-top:10px; text-align:center; display:none;"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRTIjVzxF25XURIqR6kx8TYJXFTXmqeMU",
            authDomain: "health-care-c5fe3.firebaseapp.com",
            projectId: "health-care-c5fe3",
            storageBucket: "health-care-c5fe3.firebasestorage.app",
            messagingSenderId: "104419019360",
            appId: "1:104419019360:web:fbd745b50a3d65d7d65105"
        };
        firebase.initializeApp(firebaseConfig);

        function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // 1. Mark as logged in
                    localStorage.setItem('isLoggedIn', 'true');
                    // 2. Redirect to dashboard
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    errorEl.innerText = "Invalid Staff Credentials";
                    errorEl.style.display = "block";
                });
        }
    </script>
</body>
</html>
