<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMK CERIA - Staff Login</title>
    <style>
        /* --- General Layout --- */
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
        }

        /* --- UI ADJUSTING SECTION --- */
        .login-container { 
            background: white; 
            padding: 40px; 
            
            /* Responsive Logic */
            width: 90%;            /* 90% width on mobile */
            max-width: 400px;      /* Slightly wider/longer on Computer */
            
            box-sizing: border-box; 
            margin: auto;          
            border-radius: 20px; 
            border: 2px solid #cbd5e1; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        h2 { 
            font-size: 20px; 
            color: #1e293b; 
            border-bottom: 2px solid #3b82f6; 
            padding-bottom: 10px; 
            margin-bottom: 25px; 
            text-align: center; 
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #64748b; margin-bottom: 8px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1.5px solid #cbd5e1; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }
        
        input:focus { border-color: #3b82f6; }

        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-login:active { transform: scale(0.98); }

        #error-msg { 
            color: #ef4444; 
            font-size: 12px; 
            margin-top: 15px; 
            text-align: center; 
            min-height: 14px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Staff Login</h2>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password">
        </div>

        <button class="btn-login" onclick="handleLogin()">Login</button>

        <p id="error-msg"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRTIjVzxF25XURIqR6kx8TYJXFTXmqeMU",
            authDomain: "health-care-c5fe3.firebaseapp.com",
            projectId: "health-care-c5fe3",
            storageBucket: "health-care-c5fe3.firebasestorage.app",
            messagingSenderId: "104419019360",
            appId: "1:104419019360:web:fbd745b50a3d65d7d65105"
        };
        firebase.initializeApp(firebaseConfig);

        function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Alert message upon success
                    alert("Login Successful! Redirecting to Dashboard...");
                    
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    errorEl.innerText = "Invalid email or password. Please try again.";
                });
        }
    </script>
</body>
</html>
